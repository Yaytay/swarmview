# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Release

on:
  push:
    tags: [ "*" ]

jobs:
  build:

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write

    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            node-version: 24.x
          - runner: ubuntu-24.04-arm64
            platform: linux/arm64
            node-version: 24.x

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Ensure correct npm version
      run: npm install -g npm@latest

    - name: Build UI
      run: |
        sed -i 's#<meta name="version" content="" />#<meta name="version" content="'${GITHUB_REF_NAME}'@'${GITHUB_SHA}'" />#' index.html
        sed -i 's#<span>0.0.0</span>#<span>'"${GITHUB_REF_NAME}"'</span>#' src/Version.tsx
        sed -i 's#  "version": "[0-9].[0-9].[0-9]",#  "version": "'"${GITHUB_REF_NAME}"'",#' package.json
        grep version index.html
        npm -v
        npm ci
        npx tsc --noEmit
        npm run build --if-present
        tar -czf build.tar.gz dist

    - name: Build server
      run: |
        cd server
        sed -i 's#  "version": "[0-9].[0-9].[0-9]",#  "version": "'"$GITHUB_REF_NAME"'",#' package.json
        npm ci
        npx tsc --noEmit

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push image
      run: |
        docker buildx build --platform ${{ matrix.platform }} \
          -t ghcr.io/yaytay/${GITHUB_REPOSITORY#*/}:${GITHUB_REF_NAME}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }} \
          --push .


    - name: Create SBOMs
      run: |
        npx --yes @cyclonedx/cyclonedx-npm --output-file swarmview-ui.sbom.json
        cd server
        npx --yes @cyclonedx/cyclonedx-npm --output-file ../swarmview-server.sbom.json
        cd ..
        PLATFORM_TAG=${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
        docker run -v /var/run/docker.sock:/var/run/docker.sock -v$(pwd):/app:rw  aquasec/trivy --format cyclonedx --output /app/swarmview-docker.sbom.json image ghcr.io/yaytay/${GITHUB_REPOSITORY#*/}:${GITHUB_REF_NAME}-${PLATFORM_TAG}
        sed -i 's#"specVersion": "1.6"#"specVersion": "1.5"#' swarmview-docker.sbom.json
        docker run -v .:/files cyclonedx/cyclonedx-cli merge --input-files /files/swarmview-docker.sbom.json /files/swarmview-server.sbom.json /files/swarmview-ui.sbom.json --output-file /files/swarmview.sbom.json --group spudspy --name swarmview --version "$GITHUB_REF_NAME" --hierarchical

    - name: Attach SBOM to image
      run: |
        PLATFORM_TAG=${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
        docker run --rm -v .:/workspace -v ${HOME}/.docker:/root/.docker -v /var/run/docker:/var/run/docker ghcr.io/oras-project/oras:v1.2.0 attach --artifact-type application/vnd.cyclonedx+json ghcr.io/yaytay/${GITHUB_REPOSITORY#*/}:${GITHUB_REF_NAME}-${PLATFORM_TAG} swarmview.sbom.json
        
    - name: Upload SBOMs
      uses: actions/upload-artifact@v4
      with:
        name: sbom-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
        path: swarmview*.sbom.json

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
    - name: Download all SBOMs
      uses: actions/download-artifact@v4
      with:
        pattern: sbom-*
        merge-multiple: true

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Create multi-arch manifest
      run: |
        docker buildx imagetools create -t ghcr.io/yaytay/${GITHUB_REPOSITORY#*/}:${GITHUB_REF_NAME} \
          ghcr.io/yaytay/${GITHUB_REPOSITORY#*/}:${GITHUB_REF_NAME}-amd64 \
          ghcr.io/yaytay/${GITHUB_REPOSITORY#*/}:${GITHUB_REF_NAME}-arm64

    - name: Create release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "swarmview*.sbom.json"
        token: ${{ github.token }}

